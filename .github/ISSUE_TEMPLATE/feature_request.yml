name: Feature request
description: Suggest an improvement to the CLI, API, dashboard, or provider model.
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What workflow is blocked or awkward today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change you would like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or other designs you already explored.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add examples, screenshots, or related issues if they help.
