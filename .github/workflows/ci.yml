name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    # Postgres service so the Postgres provider suites (postgres-*) actually run
    # instead of silently skipping. The tests read DATABASE_URL.
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kanban_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.11'

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Install UI dependencies
        run: cd ui && bun install --frozen-lockfile

      - name: Lint and typecheck
        run: bun run check

      - name: Run tests
        run: bun test
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/kanban_test

      - name: Build CLI bundle
        run: bun run build

      - name: Build web dashboard
        run: bun run ui:build
