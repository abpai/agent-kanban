# Local Postgres for the provider parity proof.
#
# Mirrors the `postgres` service in `.github/workflows/ci.yml` (image, user,
# password, database, port) so a local `bun run test:pg` run reproduces exactly
# what CI proves. The container is disposable: `bun run pg:down` removes it and
# its volume, keeping the proof reversible by construction (no persistent state
# leaks between runs).
#
# Usage:
#   bun run pg:up      # start Postgres, block until healthy
#   bun run test:pg    # run the suite with DATABASE_URL pointed at it
#   bun run pg:down    # tear it down and drop the volume

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kanban_test
    ports:
      # Host port defaults to 5432 (matches CI). Override KANBAN_PG_PORT if 5432
      # is already taken locally, and point DATABASE_URL at the same port.
      - '${KANBAN_PG_PORT:-5432}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d kanban_test']
      interval: 5s
      timeout: 5s
      retries: 10
    tmpfs:
      # Keep the data directory in memory: fast, and nothing survives teardown.
      - /var/lib/postgresql/data
